x-logging:
  &logging
  logging:
    driver: "json-file"
    options:
      max-file: "5"
      max-size: "400m"

services:
  northstar-dedicated:
    << : *logging
    image: ghcr.io/asillyneko/northstar-dedicated:latest
    network_mode: host # DO NOT REMOVE
    tty: true
    stdin_open: true
    environment:
      - NS_PORT=37016
      - NSWRAP_NOWATCHDOGQUIT=1
      - |
        NS_EXTRA_ARGUMENTS=
        +setplaylist tdm
        +mp_gamemode tdm
        +map mp_coliseum
        +sv_minupdaterate 60
        +sv_max_props_multiplayer 500000
        +sv_max_prop_data_dwords_multiplayer 800000
        +net_chan_limit_msec_per_sec 500
        +net_compresspackets 1
        +net_compresspackets_minsize 32
        +base_tickinterval_mp 0.016666667
        +rate 786432
        +sv_updaterate_mp 60
        +sv_minupdaterate 60
        +sv_max_snapshots_multiplayer 900
        +ns_auth_allow_insecure 1
        +ns_report_server_to_masterserver 0
        -enablechathooks
        -allowlocalhttp
        -multiple
        -nopakdedi
    volumes:
      - ./titanfall2-files-github-actions:/mnt/titanfall2:ro
      - ./Test-Build-Mod:/mnt/mods/Test-Build-Mod:ro
    restart: always