version: 2

multi-ecosystem-groups:
  everything:
    schedule:
      interval: daily

updates:
  - package-ecosystem: github-actions
    cooldown:
      default-days: 7
    directory: /
    patterns:
      - "*"
    multi-ecosystem-group: everything

  - package-ecosystem: nix
    cooldown:
      default-days: 6
    directory: /
    patterns:
      - "*"
    multi-ecosystem-group: everything
