name: update-versions

on:
  push:
    paths: ['.github/workflows/update-versions.yml']
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions: {}

jobs:
  update-versions:
    if: github.repository == 'ASillyNeko/Northstar-Dedicated'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.ASILLYNEKO_BOT_CLIENT_ID }}
          private-key: ${{ secrets.ASILLYNEKO_BOT_PRIVATE_KEY }}
          repositories: ${{ github.repository }}
          permission-contents: write
          permission-pull-requests: write

      - name: Get Versions
        id: version
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          echo 'unqualified-search-registries = [ "docker.io" ]' | sudo tee /etc/containers/registries.conf
          ALPINE_OUTPUT=$(nix run github:NixOS/nixpkgs/nixos-unstable#nix-prefetch-docker -- \
          --image-name alpine \
          --image-tag latest \
          --arch amd64 \
          --quiet)
          LATEST_ALPINE_DIGEST=$(echo "$ALPINE_OUTPUT" | sed -n 's/.*imageDigest = "\([^"]*\)".*/\1/p')
          LATEST_ALPINE_SHA256SUM=$(echo "$ALPINE_OUTPUT" | sed -n 's/.*hash = "\([^"]*\)".*/\1/p')
          echo "LATEST_ALPINE_DIGEST=$LATEST_ALPINE_DIGEST" >> $GITHUB_OUTPUT
          echo "LATEST_ALPINE_SHA256SUM=$LATEST_ALPINE_SHA256SUM" >> $GITHUB_OUTPUT
          curl -s -H "Authorization: token $GH_TOKEN" https://api.github.com/repos/R2Northstar/Northstar/releases/latest > latest_northstar_release.json
          LATEST_NORTHSTAR_VERSION=$(jq -r '.tag_name' latest_northstar_release.json)
          LATEST_NORTHSTAR_VERSION_SHA256SUM=$(jq -r '.assets[0].digest' latest_northstar_release.json)
          echo "LATEST_NORTHSTAR_VERSION=$LATEST_NORTHSTAR_VERSION" >> $GITHUB_OUTPUT
          echo "LATEST_NORTHSTAR_VERSION_SHA256SUM=$LATEST_NORTHSTAR_VERSION_SHA256SUM" >> $GITHUB_OUTPUT
          rm latest_northstar_release.json

      - name: Update version.sh
        env:
          ALPINE_DIGEST: ${{ steps.version.outputs.LATEST_ALPINE_DIGEST }}
          ALPINE_SHA256SUM: ${{ steps.version.outputs.LATEST_ALPINE_SHA256SUM }}
          NORTHSTAR_VERSION: ${{ steps.version.outputs.LATEST_NORTHSTAR_VERSION }}
          NORTHSTAR_SHA256SUM: ${{ steps.version.outputs.LATEST_NORTHSTAR_VERSION_SHA256SUM }}
        run: |
          echo "export ALPINE_DIGEST=${ALPINE_DIGEST}" > versions.sh
          echo "export ALPINE_SHA256SUM=${ALPINE_SHA256SUM}" >> versions.sh
          echo "export NORTHSTAR_VERSION=${NORTHSTAR_VERSION}" >> versions.sh
          echo "export NORTHSTAR_SHA256SUM=${NORTHSTAR_SHA256SUM}" >> versions.sh

      - name: Check for Changes
        id: git-check
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "no_changes=true" >> $GITHUB_OUTPUT
          else
            echo "no_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        id: cpr
        if: steps.git-check.outputs.no_changes == 'false'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.generate-token.outputs.token }}
          author: "asillyneko-bot[bot] <asillyneko-bot[bot]@users.noreply.github.com>"
          committer: "asillyneko-bot[bot] <asillyneko-bot[bot]@users.noreply.github.com>"
          commit-message: "Update versions."
          title: "Update versions"
          branch: "update-versions"
          labels: dependencies
          delete-branch: true

      - name: Enable auto merge
        if: steps.git-check.outputs.no_changes == 'false' && steps.cpr.outputs.pull-request-operation == 'created'
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: gh pr merge --auto -s "$PR_NUMBER"
