name: dependabot-auto-merge

on:
  pull_request_target:
    types: opened

permissions: {}

jobs:
  auto-merge:
    if: github.repository == 'ASillyNeko/Northstar-Dedicated' && github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-slim

    steps:
      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.NORTHSTAR_DEDICATED_CLIENT_ID }}
          private-key: ${{ secrets.NORTHSTAR_DEDICATED_PRIVATE_KEY }}
          repositories: ${{ github.repository }}
          permission-contents: write
          permission-pull-requests: write

      - name: Enable auto merge
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: gh pr merge --auto -s "$PR_URL"
